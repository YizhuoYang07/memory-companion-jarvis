name: PersonalMemoryClient
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 0.1.1
    DEVELOPMENT_TEAM: "B7Y6Q68C7G"
targets:
  PersonalMemoryClient-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: Jarvis
        PRODUCT_BUNDLE_IDENTIFIER: ai.jarvis.personal-memory.ios
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Jarvis
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Select images to attach to a Jarvis conversation.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Allow Jarvis to reach the backend running on your Mac or local server.
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
  PersonalMemoryClient-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Shared
      - path: Sources/macOS
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: Jarvis
        PRODUCT_BUNDLE_IDENTIFIER: ai.jarvis.personal-memory.macos
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Jarvis
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Select images to attach to a Jarvis conversation.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
schemes:
  PersonalMemory-iOS:
    build:
      targets:
        PersonalMemoryClient-iOS: all
    run:
      config: Debug
  PersonalMemory-macOS:
    build:
      targets:
        PersonalMemoryClient-macOS: all
    run:
      config: Debug