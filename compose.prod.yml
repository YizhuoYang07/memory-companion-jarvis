services:
  personal-memory-system:
    build:
      context: .
    image: personal-memory-system:latest
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "3030"
    restart: unless-stopped

  caddy:
    image: caddy:2.10
    depends_on:
      - personal-memory-system
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: